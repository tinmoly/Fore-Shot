<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fore!Shot Practice App - Wedge</title>

<style>
body{font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0b3d2e;color:#fff;margin:0;padding:20px}
body.flash-green{animation:flashGreen .15s ease-in-out}
body.flash-red{animation:flashRed .15s ease-in-out}

@keyframes flashGreen{from{background:#0b3d2e}to{background:#145a43}}
@keyframes flashRed{from{background:#0b3d2e}to{background:#6b2a2a}}

.card{background:#145a43;border-radius:14px;padding:20px;max-width:460px;margin:0 auto;box-shadow:0 10px 25px rgba(0,0,0,.3)}
h1,h3{text-align:center;margin-bottom:10px}

.distance-row{display:flex;gap:8px;overflow-x:auto;margin-bottom:12px}
.distance-btn{background:#1c7c5b;border:none;padding:10px 20px;border-radius:999px;font-weight:800;color:#fff;cursor:pointer;white-space:nowrap;font-size:24px}
.distance-btn.active{background:#2ecc71;color:#000}

.shot-ring{width:285px;height:285px;border-radius:50%;position:relative;margin:10px auto;transform:rotate(45deg)}

.shot-ring::before,.shot-ring::after{content:"";position:absolute;background:#000;opacity:.9;pointer-events:none;z-index:4}
.shot-ring::before{width:2px;height:100%;left:50%;top:0;transform:translateX(-50%) rotate(45deg)}
.shot-ring::after{width:2px;height:100%;left:50%;top:0;transform:translateX(-50%) rotate(-45deg)}

.miss-wedge{position:absolute;inset:0;border-radius:50%;background:#E34234;cursor:pointer;-webkit-mask:radial-gradient(circle at center, transparent 0 55px, black 56px);mask:radial-gradient(circle at center, transparent 0 55px, black 56px)}
.miss-wedge:hover{filter:brightness(1.1)}
.miss-wedge:active{transform:scale(.97) translateY(3px);filter:brightness(.95)}

button:active{transform:translateY(3px) scale(.98);box-shadow:0 2px 0 rgba(0,0,0,.35)!important}

.miss-topright{clip-path:polygon(50% 50%,0% 0%,100% 0%)}
.miss-bottomleft{clip-path:polygon(50% 50%,100% 100%,0% 100%)}
.miss-topleft{clip-path:polygon(50% 50%,0% 100%,0% 0%)}
.miss-bottomright{clip-path:polygon(50% 50%,100% 0%,100% 100%)}

.made-inner{width:110px;height:110px;border-radius:50%;background:#2ecc71;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:24px;font-weight:800;color:#000;box-shadow:3px 0 0 #1e9e54,0 3px 0 #1e9e54,0 10px 20px rgba(0,0,0,.35);border-bottom:3px solid #1e9e54;border-right:3px solid #1e9e54;cursor:pointer;text-align:center;line-height:1.1;position:absolute;top:50%;left:50%;transform:translate(calc(-50% - 4px),-52%) rotate(-45deg);z-index:5}
.made-inner:active{transform:translate(calc(-50% - 4px),-52%) rotate(-45deg) translateY(3px) scale(.97);box-shadow:1px 0 0 #1e9e54,0 1px 0 #1e9e54,0 6px 12px rgba(0,0,0,.35)}

.stats{text-align:center;font-size:18px;margin-top:20px}
.stats p{margin:6px 0}

.badge{margin-top:10px;padding:10px;border-radius:10px;text-align:center;background:#0e4f3a;font-size:20px;font-weight:800}

.history-card{padding:10px;background:#1c7c5b;border-radius:10px;cursor:pointer}
.history-wrapper{margin-bottom:10px}
.accordion{display:none;margin-top:8px;padding:10px;background:#0e4f3a;border-radius:10px}
.subtle{opacity:.75;font-size:14px;margin-left:6px}
</style>
</head>

<body>

<div class="card">

<h1 id="distanceTitle">30 Yard Pitch</h1>
<div id="distanceRow" class="distance-row"></div>

<div style="display:flex;flex-direction:column;align-items:center;">

<div class="shot-ring">

<div class="miss-wedge miss-topright" onclick="recordMissed('longRight')"><span style="position:absolute;top:10px;left:50%;transform:translateX(-50%);font-weight:800;color:#000;font-size:24px">Long<br>Right</span></div>
<div class="miss-wedge miss-bottomleft" onclick="recordMissed('shortLeft')"><span style="position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-weight:800;color:#000;font-size:24px">Short<br>Left</span></div>
<div class="miss-wedge miss-topleft" onclick="recordMissed('longLeft')"><span style="position:absolute;left:10px;top:50%;transform:translateY(-50%) rotate(-90deg);font-weight:800;color:#000;font-size:24px">Long<br>Left</span></div>
<div class="miss-wedge miss-bottomright" onclick="recordMissed('shortRight')"><span style="position:absolute;right:10px;top:50%;transform:translateY(-50%) rotate(270deg);font-weight:800;color:#000;font-size:24px">Short<br>Right</span></div>

<div class="made-inner" onclick="event.stopPropagation();recordMade();">Made</div>

</div>
</div>

<div class="stats">
<p>✅ Made: <span id="made">0</span> | ⛔ Missed: <span id="missed">0</span></p>
<p>⛳ Make %: <span id="percent">0</span>%</p>
<p><span id="streakLabel">🔥 Streak</span>: <span id="streak">0</span></p>
</div>

<div id="targetBadge" class="badge"></div>

<div style="display:flex;justify-content:space-between;gap:16px;margin-top:10px;width:100%;">
<button onclick="newSession()" style="flex:1;background:#0096FF;color:#000;padding:6px 10px;font-size:20px;font-weight:800;border:none;border-radius:12px;box-shadow:0 6px 0 #0074c7,0 14px 22px rgba(0,0,0,.45);cursor:pointer;">🔄️ New Session</button>
<button onclick="undoShot()" style="flex:1;background:#8a8a8a;color:#000;padding:6px 10px;font-size:20px;font-weight:800;border:none;border-radius:12px;box-shadow:0 6px 0 #666,0 14px 22px rgba(0,0,0,.45);cursor:pointer;">↩️ Undo Last Shot</button>
</div>

<div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
<h3 style="margin:0">📜 Session History</h3>
<select id="historyAction" onchange="handleHistoryAction()" style="background:#1c7c5b;color:#fff;border:none;border-radius:8px;padding:6px 8px;font-weight:700">
<option value="">Actions</option>
<option value="export">📤 Export All History</option>
<option value="delete">❌ Clear All History</option>
</select>
</div>

<div id="history"></div>

</div>

<script>

const DISTANCES=[30,35,40,45,50,55,60,65,70,75,80]
const PGA_PROXIMITY={30:15,35:18,40:21,45:24,50:27,55:30,60:33,65:36,70:39,75:42,80:45}

let currentDistance=30
let stats
let streaks
let bestStreaks
let sessions
let shotHistory=[]

const $=(id)=>{
 const el=document.getElementById(id)
 if(!el)throw new Error("Missing DOM element: "+id)
 return el
}

function ensureStatsShape(obj){
 if(!obj) obj={}
 DISTANCES.forEach(d=>{
  if(!obj[d]){
   obj[d]={made:0,missed:0,missDir:{shortLeft:0,longRight:0,longLeft:0,shortRight:0}}
  }
 })
 return obj
}

function defaultStats(){ return ensureStatsShape({}) }

function loadStats(){try{return ensureStatsShape(JSON.parse(localStorage.getItem("shootingStats")))}catch{return defaultStats()}}
function saveStats(){localStorage.setItem("shootingStats",JSON.stringify(stats))}

function loadStreaks(){let s={};try{s=JSON.parse(localStorage.getItem("shootingStreaks"))||{}}catch{};DISTANCES.forEach(d=>{if(s[d]==null)s[d]=0});return s}
function saveStreaks(){localStorage.setItem("shootingStreaks",JSON.stringify(streaks))}

function defaultBestStreaks(){let o={};DISTANCES.forEach(d=>o[d]=0);return o}
function loadSessions(){try{return JSON.parse(localStorage.getItem("shootingSessions"))||[]}catch{return[]}}
function saveSessions(){localStorage.setItem("shootingSessions",JSON.stringify(sessions))}

function buildDistanceRow(){
 const r=$("distanceRow");r.innerHTML=""
 DISTANCES.forEach(d=>{
  const b=document.createElement("button")
  b.className="distance-btn"+(d===currentDistance?" active":"")
  b.textContent=d+"y"
  b.onclick=()=>setDistance(d)
  r.appendChild(b)
 })
}

function setDistance(d){
 currentDistance=d
 streaks[d]=0
 saveStreaks()
 $("distanceTitle").textContent=d+" Yard Pitch"
 buildDistanceRow()
 updateStats()
}

function updateStats(){
 const st=stats[currentDistance]
 const made=st.made||0
 const missed=st.missed||0
 const total=made+missed
 const pct=total?Math.round(made/total*100):0

 $("made").textContent=made
 $("missed").textContent=missed
 $("percent").textContent=pct

 const s=streaks[currentDistance]||0
 let fireCount=0
 if(s>=10) fireCount=5
 else if(s>=7) fireCount=4
 else if(s>=5) fireCount=3
 else if(s>=3) fireCount=2
 else if(s>=1) fireCount=1

 let fires=""
 for(let i=0;i<fireCount;i++){fires+="🔥"}

 $("streak").textContent=s
 $("streakLabel").textContent=fires+" Streak"

 $("targetBadge").innerHTML="🎯 Target: "+PGA_PROXIMITY[currentDistance]+" ft"
}

function recordMade(){
 stats[currentDistance].made++
 streaks[currentDistance]++
 if(streaks[currentDistance]>bestStreaks[currentDistance]) bestStreaks[currentDistance]=streaks[currentDistance]
 shotHistory.push({type:"made",distance:currentDistance})
 document.body.classList.remove('flash-red')
 document.body.classList.add('flash-green')
 setTimeout(()=>document.body.classList.remove('flash-green'),150)
 saveStats();saveStreaks();updateStats()
}

function recordMissed(dir){
 const st=stats[currentDistance]
 st.missed++
 st.missDir[dir]++
 streaks[currentDistance]=0
 shotHistory.push({type:"missed",distance:currentDistance,dir})
 document.body.classList.remove('flash-green')
 document.body.classList.add('flash-red')
 setTimeout(()=>document.body.classList.remove('flash-red'),150)
 saveStats();saveStreaks();updateStats()
}

function newSession(){
 let totalMade=0,totalMissed=0
 Object.values(stats).forEach(d=>{totalMade+=d.made||0;totalMissed+=d.missed||0})
 const totalShots=totalMade+totalMissed
 const pct=totalShots?Math.round(totalMade/totalShots*100):0
 sessions.push({date:new Date().toISOString(),stats:JSON.parse(JSON.stringify(stats)),bestStreaks:JSON.parse(JSON.stringify(bestStreaks)),summary:{made:totalMade,missed:totalMissed,total:totalShots,pct:pct}})
 saveSessions()
 stats=defaultStats();streaks={};DISTANCES.forEach(d=>streaks[d]=0);bestStreaks=defaultBestStreaks();shotHistory=[]
 updateStats();renderHistory()
}

function undoShot(){
 if(!shotHistory.length)return
 const last=shotHistory.pop()
 const st=stats[last.distance]
 if(last.type==="made" && st.made>0) st.made--
 if(last.type==="missed" && st.missed>0) st.missed--
 saveStats();saveStreaks();updateStats()
}

function handleHistoryAction(){
 const sel=$("historyAction");const v=sel.value;sel.value=""
 if(v==="delete"){if(confirm("Delete all session history?")){sessions=[];saveSessions();renderHistory()}}
 if(v==="export"){exportHistoryCSV()}
}

function exportHistoryCSV(){
 let csv="Session,Date,Yardage,Made,Missed,Make %,Target ft,S-Left,S-Right,L-Left,L-Right,Best Streak\n";

 let grandMade=0;
 let grandMissed=0;
 let grandMiss={shortLeft:0,shortRight:0,longLeft:0,longRight:0};

 sessions.forEach(function(s,idx){
  const date=new Date(s.date).toLocaleDateString();

  let sessionMade=0;
  let sessionMissed=0;
  let sessionMiss={shortLeft:0,shortRight:0,longLeft:0,longRight:0};

  DISTANCES.forEach(function(d){
   const st=s.stats && s.stats[d];
   if(!st) return;

   const made=st.made||0;
   const missed=st.missed||0;
   const total=made+missed;
   if(!total) return;

   sessionMade+=made;
   sessionMissed+=missed;

   const pct=Math.round(made/total*100);
   const m=st.missDir||{shortLeft:0,longRight:0,longLeft:0,shortRight:0};

   sessionMiss.shortLeft+=m.shortLeft||0;
   sessionMiss.shortRight+=m.shortRight||0;
   sessionMiss.longLeft+=m.longLeft||0;
   sessionMiss.longRight+=m.longRight||0;

   csv += (idx+1)+","+date+","+d+","+made+","+missed+","+pct+","+PGA_PROXIMITY[d]+","+
          m.shortLeft+","+m.shortRight+","+m.longLeft+","+m.longRight+","+((s.bestStreaks && s.bestStreaks[d])||0)+"\n";
  });

  grandMade+=sessionMade;
  grandMissed+=sessionMissed;
  grandMiss.shortLeft+=sessionMiss.shortLeft;
  grandMiss.shortRight+=sessionMiss.shortRight;
  grandMiss.longLeft+=sessionMiss.longLeft;
  grandMiss.longRight+=sessionMiss.longRight;

  const totalShots=sessionMade+sessionMissed;
  const totalPct=totalShots?Math.round(sessionMade/totalShots*100):0;
  const totalMiss=sessionMiss.shortLeft+sessionMiss.shortRight+sessionMiss.longLeft+sessionMiss.longRight;

  const slPct=totalMiss?Math.round(sessionMiss.shortLeft/totalMiss*100):0;
  const srPct=totalMiss?Math.round(sessionMiss.shortRight/totalMiss*100):0;
  const llPct=totalMiss?Math.round(sessionMiss.longLeft/totalMiss*100):0;
  const lrPct=totalMiss?Math.round(sessionMiss.longRight/totalMiss*100):0;

  csv += (idx+1)+","+date+",TOTAL,"+sessionMade+","+sessionMissed+","+totalPct+",,"+
         slPct+"%"+","+srPct+"%"+","+llPct+"%"+","+lrPct+"%"+",\n";

  csv += "\n";
 });

 const gShots=grandMade+grandMissed;
 const gPct=gShots?Math.round(grandMade/gShots*100):0;
 const gMissTotal=grandMiss.shortLeft+grandMiss.shortRight+grandMiss.longLeft+grandMiss.longRight;

 const gSL=gMissTotal?Math.round(grandMiss.shortLeft/gMissTotal*100):0;
 const gSR=gMissTotal?Math.round(grandMiss.shortRight/gMissTotal*100):0;
 const gLL=gMissTotal?Math.round(grandMiss.longLeft/gMissTotal*100):0;
 const gLR=gMissTotal?Math.round(grandMiss.longRight/gMissTotal*100):0;

 csv += "GRAND TOTAL,,ALL,"+grandMade+","+grandMissed+","+gPct+",,"+
        gSL+"%"+","+gSR+"%"+","+gLL+"%"+","+gLR+"%"+",\n";

 const blob=new Blob([csv],{type:'text/csv'});
 const url=URL.createObjectURL(blob);
 const a=document.createElement('a');
 a.href=url;
 a.download='foreshot-history.csv';
 a.click();
 URL.revokeObjectURL(url);
}

function deleteSession(index){
 if(!confirm("Delete this session?")) return;
 sessions.splice(index,1);
 saveSessions();
 renderHistory();
}

function renderHistory(){
 const h=$("history");
 h.innerHTML="";
 if(!sessions.length){h.innerHTML='<p style="opacity:.8">No sessions yet.</p>';return}

 sessions.slice().reverse().forEach(function(s,i){
  const idx=sessions.length-1-i;
  const wrap=document.createElement("div");
  wrap.className="history-wrapper";

  const card=document.createElement("div");
  card.className="history-card";

  const acc=document.createElement("div");
  acc.className="accordion";

  card.innerHTML='<strong>Session '+(idx+1)+'</strong><br>'+new Date(s.date).toLocaleDateString()+' - '+s.summary.pct+'% ('+s.summary.total+' shots)';
  card.onclick=function(){acc.style.display=acc.style.display==='block'?'none':'block'};

  DISTANCES.forEach(function(d){
   const st=s.stats && s.stats[d];
   if(!st) return;

   const tot=(st.made||0)+(st.missed||0);
   if(!tot) return;

   const missDir=st.missDir||{shortLeft:0,longRight:0,longLeft:0,shortRight:0};
   const p=Math.round(st.made/tot*100);

   const row=document.createElement("div");
   row.innerHTML='<strong>'+d+' yd:</strong> '+st.made+'/'+tot+' ('+p+'%) - Target '+PGA_PROXIMITY[d]+' ft'+
    '<br><span class="subtle">Misses - L-Left: '+missDir.longLeft+' | L-Right: '+missDir.longRight+' | S-Left: '+missDir.shortLeft+' | S-Right: '+missDir.shortRight+' | Best streak: '+((s.bestStreaks && s.bestStreaks[d])||0)+'</span>';

   acc.appendChild(row);
  });

  const delBtn=document.createElement("button");
  delBtn.innerHTML='<span style="font-size:18px;vertical-align:middle">🗑️</span> Delete Session';
  delBtn.onclick=function(e){e.stopPropagation();deleteSession(idx)};
  delBtn.style='display:block;width:100%;margin-top:10px;background:#E34234;color:#000;padding:6px 10px;font-size:24px;font-weight:800;border:none;border-radius:12px;cursor:pointer;';

  acc.appendChild(delBtn);

  wrap.appendChild(card);
  wrap.appendChild(acc);
  h.appendChild(wrap);
 });
}

function initApp(){
 stats=ensureStatsShape(loadStats());
 streaks=loadStreaks();
 bestStreaks=defaultBestStreaks();
 sessions=loadSessions();
 buildDistanceRow();
 updateStats();
 renderHistory();
}

if(document.readyState==='loading'){document.addEventListener('DOMContentLoaded',initApp)}else{initApp()}

</script>

</body>
</html>
